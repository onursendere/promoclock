name = "promoclock-status"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Serve the Worker at the production path. The promoclock.co zone must be on the
# same Cloudflare account you `wrangler login` with. This route intercepts
# /api/status before the request reaches the cPanel origin.
routes = [
  { pattern = "promoclock.co/api/status*", zone_name = "promoclock.co" }
]

# Rate limiting (1 req / 5 min / IP) is NOT done here — add a Cloudflare
# "Rate limiting rule" (Security → WAF → Rate limiting rules) matching:
#   URI Path equals /api/status  →  1 request per 5 minutes per client IP  →  Block (429)
# (The in-Worker `ratelimit` binding only supports 10s/60s periods, so it can't
#  express a 5-minute window.)
